<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한원희연구소_견적메일 일정표</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body class="text-gray-800">

    <header class="header sticky top-0 z-50 py-3 px-4 sm:px-6 lg:px-8">
        <div class="max-w-7xl mx-auto flex justify-between items-center h-[60px]">
            <div id="headerTitleSection" class="header-title-container">
            </div>
            <div class="flex items-center space-x-2">
                <button id="saveHtmlButton" class="action-button bg-orange-500 text-white hover:bg-orange-600" title="현재 일정 저장">
                     <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                        <path d="M17 21 L17 13 H7 v8"></path>
                        <path d="M7 3 L7 8 H3"></path>
                    </svg>
                    <span class="hidden sm:inline">일정 저장</span>
                </button>
                <button id="saveAsNewToDbButton" class="action-button bg-blue-500 text-white hover:bg-blue-600" title="현재 일정을 다른 이름으로 저장">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><path d="M17 16h-4v4h-2v-4H7v-2h4V7h2v7h4z"></path>
                    </svg>
                    <span class="hidden sm:inline">일정 다른이름 저장</span>
                </button>
                <input type="file" id="loadHtmlInput" accept=".html" style="display: none;">
                <button id="loadHtmlButtonTrigger" class="action-button bg-yellow-500 text-white hover:bg-yellow-600" title="일정 불러오기">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    <span class="hidden sm:inline">일정 불러오기</span>
                </button>
                <button id="copyInlineHtmlButton" class="action-button bg-teal-500 text-white hover:bg-teal-600" title="코드 복사">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    <span class="hidden sm:inline">코드 복사</span>
                </button>
                <button id="inlinePreviewButton" class="action-button bg-cyan-500 text-white hover:bg-cyan-600" title="인라인 형식 미리보기">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                    <span class="hidden sm:inline">미리보기</span>
                </button>
                <a href="attractions.html" class="action-button bg-purple-500 text-white hover:bg-purple-600" title="관광지 DB 관리" style="text-decoration:none;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path></svg>
                    <span class="hidden sm:inline">관광지 DB</span>
                </a>


                </div>
        </div>
    </header>

    <main class="main-content max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">
        <div id="daysContainer" class="space-y-4">
            </div>

        <div class="add-day-button-container mt-6 text-center">
            <button id="addDayButton" class="action-button bg-indigo-500 text-white hover:bg-indigo-600">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                새 날짜 추가
            </button>
            <input type="file" id="loadDayAtIndexHtmlInput" accept=".html" style="display: none;">
        </div>
    </main>

    <div id="activityModal" class="modal-backdrop hidden">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-4">
                <h2 id="modalTitle" class="text-xl font-bold">새 일정 추가</h2>
            </div>
            <form id="activityForm">
                <input type="hidden" id="activityId">
                <input type="hidden" id="dayIndex">
                <div>
                    <label for="activityTimeInput">시간 (HHMM 형식, 선택 사항):</label>
                    <input type="text" id="activityTimeInput" placeholder="예: 1130 또는 0900" maxlength="4">
                </div>
                <div>
                    <label for="activityIconSelect">아이콘 선택:</label>
                    <select id="activityIconSelect"> </select>
                </div>
                <div>
                    <label for="activityTitle">활동/장소명:</label>
                    <input type="text" id="activityTitle" required placeholder="예: 루브르 박물관 방문">
                </div>
                <div>
                    <label for="activityDescription">간단 설명/메모:</label>
                    <textarea id="activityDescription" rows="3" placeholder="예: 모나리자 및 주요 작품 관람"></textarea>
                </div>

                <div>
                    <label for="activityImageUrl">이미지 URL:</label>
                    <input type="url" id="activityImageUrl" placeholder="예: https://example.com/image.jpg (선택 사항)">
                </div>
                <div>
                    <label for="activityCost">비용:</label>
                    <input type="text" id="activityCost" placeholder="예: €20 또는 ₩25,000 (선택 사항)">
                </div>
                <div>
                    <label for="activityNotes">기타 필드 (예약번호 등):</label>
                    <input type="text" id="activityNotes" placeholder="예: 예약번호: 12345 (선택 사항)">
                </div>
                <div class="modal-buttons flex flex-wrap gap-2 justify-end">
                    <button type="button" id="saveToAttractionDbButton" class="action-button bg-blue-50 text-blue-600 border border-blue-200 hover:bg-blue-100 mr-auto" title="현재 정보를 관광지 DB에 보관">DB 등록</button>
                    <button type="button" id="cancelActivityButton" class="action-button bg-gray-300 hover:bg-gray-400">취소</button>
                    <button type="submit" id="saveActivityButton" class="action-button bg-green-500 text-white hover:bg-green-600">저장</button>
                </div>
            </form>
        </div>
    </div>

    <div id="confirmDeleteDayModal" class="modal-backdrop hidden">
        <div class="modal-content confirm-modal-content"> <h3 class="text-lg font-semibold mb-4">일정 삭제 확인</h3>
            <p id="confirmDeleteDayMessage" class="mb-6">정말로 이 날짜의 모든 일정을 삭제하시겠습니까?</p>
            <div class="modal-buttons">
                <button id="cancelDeleteDayButton" class="action-button bg-gray-300 hover:bg-gray-400">아니오</button>
                <button id="confirmDeleteDayActionButton" class="action-button bg-red-500 text-white hover:bg-red-600">예, 삭제합니다</button>
            </div>
        </div>
    </div>

    <div id="loadTripModal" class="modal-backdrop hidden">
        <div class="modal-content">
            <h3 class="text-lg font-semibold mb-4">불러올 여행 일정 선택</h3>
            <div class="mb-3">
                <input type="text" id="tripSearchInput" placeholder="여행 제목으로 검색..." class="w-full p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div id="tripListContainer" class="max-h-72 overflow-y-auto border p-2 rounded">
                <p id="loadingTripListMsg" style="display: none;">목록을 불러오는 중...</p>
                <ul id="tripListForLoad" class="space-y-1">
                </ul>
            </div>
            <div class="modal-buttons mt-6">
                <button type="button" id="cancelLoadTripModalButton" class="action-button bg-gray-300 hover:bg-gray-400">취소</button>
            </div>
        </div>
    </div>

    <div id="loadAttractionModal" class="modal-backdrop hidden z-[60]">
        <div class="modal-content">
            <h3 class="text-lg font-semibold mb-4">관광지 DB 불러오기</h3>
            <div class="mb-3">
                <input type="text" id="attractionSearchInput" placeholder="이름으로 검색..." class="w-full p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div id="attractionListContainer" class="max-h-72 overflow-y-auto border p-2 rounded">
                <p id="loadingAttractionListMsg" style="display: none;">목록을 불러오는 중...</p>
                <ul id="attractionListForLoad" class="space-y-1">
                </ul>
            </div>
            <div class="modal-buttons mt-6">
                <button type="button" id="cancelLoadAttractionModalButton" class="action-button bg-gray-300 hover:bg-gray-400">닫기</button>
            </div>
        </div>
    </div>

    <div id="manageAttractionModal" class="modal-backdrop hidden z-[60]">
        <div class="modal-content" style="max-width: 640px;">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold">🗺️ 관광지 DB 관리</h3>
                <div class="flex items-center gap-1.5">
                    <button type="button" id="downloadExcelTemplateBtn" class="text-sm bg-emerald-500 text-white hover:bg-emerald-600 py-1.5 px-3 rounded flex items-center gap-1" title="예시 엑셀 파일 다운로드">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        예시 엑셀
                    </button>
                    <button type="button" id="uploadExcelBtn" class="text-sm bg-blue-500 text-white hover:bg-blue-600 py-1.5 px-3 rounded flex items-center gap-1" title="엑셀 파일로 대량 업로드">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                        엑셀 업로드
                    </button>
                    <input type="file" id="excelUploadInput" accept=".xlsx,.xls,.csv" style="display: none;">
                    <button type="button" id="addNewAttractionBtn" class="text-sm bg-green-500 text-white hover:bg-green-600 py-1.5 px-3 rounded flex items-center gap-1">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        새 관광지 등록
                    </button>
                </div>
            </div>
            <div class="mb-3">
                <input type="text" id="manageAttractionSearchInput" placeholder="관광지 이름으로 검색..." class="w-full p-2 border border-gray-300 rounded-md focus:ring-purple-500 focus:border-purple-500">
            </div>
            <div id="manageAttractionListContainer" class="max-h-96 overflow-y-auto border rounded p-2">
                <p id="manageAttractionLoadingMsg" style="display: none;">목록을 불러오는 중...</p>
                <div id="manageAttractionList"></div>
            </div>
            <div class="modal-buttons mt-4">
                <button type="button" id="closeManageAttractionModalBtn" class="action-button bg-gray-300 hover:bg-gray-400">닫기</button>
            </div>
        </div>
    </div>

    <div id="editAttractionModal" class="modal-backdrop hidden z-[70]">
        <div class="modal-content">
            <h3 id="editAttractionModalTitle" class="text-lg font-semibold mb-4">관광지 정보 수정</h3>
            <form id="editAttractionForm">
                <input type="hidden" id="editAttractionId">
                <div>
                    <label for="editAttractionIcon">아이콘 선택:</label>
                    <select id="editAttractionIcon"></select>
                </div>
                <div>
                    <label for="editAttractionTitle">관광지명:</label>
                    <input type="text" id="editAttractionTitle" required placeholder="예: 왓 아룬">
                </div>
                <div>
                    <label for="editAttractionDescription">설명/메모:</label>
                    <textarea id="editAttractionDescription" rows="3" placeholder="예: 방콕 대표 사원"></textarea>
                </div>
                <div>
                    <label for="editAttractionLocation">주소/위치 링크:</label>
                    <input type="url" id="editAttractionLocation" placeholder="예: https://maps.google.com/...">
                </div>
                <div>
                    <label for="editAttractionImageUrl">이미지 URL:</label>
                    <input type="url" id="editAttractionImageUrl" placeholder="예: https://example.com/image.jpg">
                </div>
                <div>
                    <label for="editAttractionCost">비용:</label>
                    <input type="text" id="editAttractionCost" placeholder="예: ฿100">
                </div>
                <div>
                    <label for="editAttractionNotes">기타 메모:</label>
                    <input type="text" id="editAttractionNotes" placeholder="예: 복장 규정 있음">
                </div>
                <div class="modal-buttons">
                    <button type="button" id="cancelEditAttractionBtn" class="action-button bg-gray-300 hover:bg-gray-400">취소</button>
                    <button type="submit" class="action-button bg-purple-500 text-white hover:bg-purple-600">저장</button>
                </div>
            </form>
        </div>
    </div>

    <div id="addActivityChoiceModal" class="modal-backdrop hidden z-[55]">
        <div class="modal-content" style="max-width: 360px; text-align: center;">
            <h3 class="text-lg font-semibold mb-2">일정 추가 방식 선택</h3>
            <p class="text-sm text-gray-500 mb-5">관광지 DB에서 가져오거나 직접 새로 입력할 수 있습니다.</p>
            <div class="flex flex-col gap-3">
                <button id="choiceFromDbBtn" class="action-button bg-indigo-500 text-white hover:bg-indigo-600 justify-center py-3 text-base" style="width:100%;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path></svg>
                    관광지 DB에서 가져오기
                </button>
                <button id="choiceNewInputBtn" class="action-button bg-teal-500 text-white hover:bg-teal-600 justify-center py-3 text-base" style="width:100%;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    새로 직접 입력
                </button>
            </div>
            <button id="choiceCancelBtn" class="action-button bg-gray-200 hover:bg-gray-300 mt-4 justify-center" style="width:100%;">취소</button>
        </div>
    </div>

    <div id="toast" class="fixed bottom-5 right-5 bg-gray-800 text-white py-2 px-4 rounded-md shadow-lg transition-opacity duration-300 opacity-0 z-[70]">
        </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    
    <script src="script.js"></script>

</body>
</html>
